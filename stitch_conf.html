<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alerta Enviada - Confirmación SOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.33); }
            80%, 100% { opacity: 0; }
        }
        .pulse-dot {
            animation: pulse-dot 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.8); }
            50% { transform: scale(1); }
            100% { transform: scale(0.8); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<main class="flex-1 flex flex-col items-center justify-between p-6 max-w-md mx-auto w-full">
<div class="w-full flex flex-col items-center pt-12">
<!-- Large Success Indicator -->
<div class="relative flex items-center justify-center mb-8">
<div class="absolute w-32 h-32 bg-primary/20 rounded-full pulse-ring"></div>
<div class="relative bg-primary text-slate-900 w-24 h-24 rounded-full flex items-center justify-center shadow-lg shadow-primary/40">
<span class="material-symbols-outlined text-[64px] font-bold">check</span>
</div>
</div>
<!-- Main Heading -->
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[40px] font-extrabold leading-tight text-center px-2 mb-4 uppercase">
                ALERTA ENVIADA
            </h1>
<p class="text-slate-600 dark:text-slate-400 text-xl font-normal leading-relaxed text-center px-4">
                Su ubicación ha sido compartida con seguridad y su familia.
            </p>
</div>
<!-- Status Card -->
<div class="w-full py-8">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-100 dark:border-slate-700 p-6 flex flex-col items-center gap-6">
<div class="relative w-full aspect-video rounded-lg overflow-hidden bg-slate-200 dark:bg-slate-700 shadow-inner">
<img alt="Mapa de ubicación en tiempo real" class="w-full h-full object-cover opacity-80" data-alt="Mapa de la ciudad con un marcador de ubicación actual" data-location="Madrid" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnQtMynkqjV2SIUnxyAPxsVXgtuausrQeZ0upiD8tyICtuJ3fPe771rlKVUyuQ_PyTEt4WHnWesL-7JdqQBWxq5SPds7xQuiNoIbSiQb3wLMVcDQeLxVwZOisXXd2hXM2bozY_rFkLL0ucm7Uppac9A8aCR9ueP2OD8RnQF4lfj8fO2ecp1xZAShvwh930V6SGxO0AAABBTcuzmP4CFXHDjAT7ifry35T1ZgDEzbgKRuyOS1KYQ3Cz7eFdxTh7OnTSctgr8uu9Otc"/>
<div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 to-transparent flex items-end p-4">
<div class="flex items-center gap-2">
<span class="w-3 h-3 bg-primary rounded-full pulse-dot"></span>
<span class="text-white font-bold text-sm uppercase tracking-wider">Ubicación en vivo</span>
</div>
</div>
</div>
<div class="text-center">
<p class="text-primary text-sm font-bold tracking-[0.2em] mb-1 uppercase">ESTADO ACTIVO</p>
<h2 class="text-slate-900 dark:text-white text-3xl font-extrabold leading-tight mb-2">Ayuda en camino</h2>
<p class="text-slate-500 dark:text-slate-400 text-lg">Mantenga la calma y espere en su lugar.</p>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="w-full pb-8">
<div class="flex flex-col gap-4">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-20 px-5 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-xl font-bold leading-normal tracking-wide transition-colors active:bg-slate-300 dark:active:bg-slate-700 border-2 border-slate-300 dark:border-slate-600">
<span class="material-symbols-outlined mr-3">close</span>
<span class="truncate">CANCELAR POR ERROR</span>
</button>
<!-- Silent Notification Hint -->
<p class="text-center text-slate-400 dark:text-slate-500 text-sm font-medium">
                    Emergencia notificada a las 14:32
                </p>
</div>
</div>
</main>
<!-- Visual Polish: Decorative Gradient Background elements -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden pointer-events-none opacity-20">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/30 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
</div>
</body></html>
